# Automatic release-notes categorisation for softprops/action-gh-release
# (generate_release_notes uses GitHub's native config from this file).
changelog:
  exclude:
    labels:
      - ignore-for-release
      - duplicate
      - invalid
  categories:
    - title: Features
      labels:
        - feature
        - feat
        - enhancement
    - title: Bug Fixes
      labels:
        - fix
        - bug
    - title: Security
      labels:
        - security
    - title: Dependencies
      labels:
        - dependencies
        - deps
    - title: Documentation
      labels:
        - docs
        - documentation
    - title: Other Changes
      labels:
        - "*"
