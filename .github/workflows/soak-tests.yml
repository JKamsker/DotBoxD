name: soak-tests

on:
  schedule:
    - cron: '11 1 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  soak:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      DOTBOXD_SOAK_ITERATIONS: '1000000'
      DOTBOXD_SOAK_DURATION_MINUTES: '120'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 10.0.x
      - run: >-
          dotnet test tests/DotBoxD.Services.Tests/DotBoxD.Services.Tests.csproj
          -c Release --filter Category=Soak
