name: _probe-fix-ci-token
# Throwaway probe: verifies that a push to a [surprise-red-test] PR branch authenticated
# by GH_AW_CI_TRIGGER_TOKEN produces an UNGATED pull_request CI run (actor = PAT user, not
# github-actions[bot] / action_required). This is the exact mechanism the fix worker now
# uses (library-surprise-fix push-to-pull-request-branch github-token override). Delete
# after validating. Mirrors the maintainer's prior CI-trigger-token probe (8279a02e).
on:
  workflow_dispatch:
    inputs:
      branch:
        description: Head branch of an existing open [surprise-red-test] PR.
        required: true
        type: string

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch with the CI-trigger PAT
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GH_AW_CI_TRIGGER_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
      - name: Push a PAT-authored empty commit
        run: |
          git config user.name "Jonas Kamsker"
          git config user.email "11245306+JKamsker@users.noreply.github.com"
          git commit --allow-empty -m "probe: validate PAT push ungates fixed-PR CI"
          git push origin "HEAD:${{ inputs.branch }}"
