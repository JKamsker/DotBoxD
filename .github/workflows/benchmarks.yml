name: benchmarks

# BenchmarkDotNet suites. Runs weekly, on demand, and on a PR only when it carries the
# 'benchmark' label. Results are tracked over time with github-action-benchmark; regression
# gating runs on labeled pull requests and the scheduled main-branch run. Only scheduled main
# runs track and push benchmark history; manual runs only measure.
#
# BenchmarkDotNet's JSON exporter writes one *-report-full-compressed.json per benchmark
# class. github-action-benchmark consumes a single file, so each suite's per-class reports
# are merged (their Benchmarks arrays concatenated) into one valid BDN JSON before tracking.

on:
  schedule:
    # Mondays 04:17 UTC.
    - cron: '17 4 * * 1'
  workflow_dispatch:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Run BenchmarkDotNet suites
    # PR runs continue on subsequent pushes while the benchmark label remains attached.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'benchmark')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Scheduled main runs track and push history; PRs and scheduled main runs may gate alerts.
      IS_TRACKING_RUN: ${{ github.event_name == 'schedule' && github.ref == 'refs/heads/main' }}
      IS_GATING_RUN: ${{ github.event_name == 'pull_request' || (github.event_name == 'schedule' && github.ref == 'refs/heads/main') }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          cache: true
          cache-dependency-path: '**/*.csproj'

      - name: Run Services benchmarks
        # Async round trips keep tiering beyond ShortRun's three warmups. More samples prevent
        # transient startup behavior from becoming a labeled-PR regression failure.
        run: >-
          dotnet run -c Release --project benchmarks/DotBoxD.Services.Benchmarks --
          --filter '*' --job short --warmupCount 10 --iterationCount 10 --exporters json
          --artifacts artifacts/benchmarks/services

      - name: Run Kernels benchmarks
        run: >-
          dotnet run -c Release --project benchmarks/DotBoxD.Kernels.Benchmarks --
          --filter '*' --job short --exporters json
          --artifacts artifacts/benchmarks/kernels

      - name: Merge BenchmarkDotNet reports per suite
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/benchmarks/merged
          merge_suite() {
            local suite="$1"
            local outFile="artifacts/benchmarks/merged/${suite}.json"
            mapfile -t reports < <(find "artifacts/benchmarks/${suite}/results" \
              -name '*-report-full-compressed.json' 2>/dev/null | sort)
            if [[ ${#reports[@]} -eq 0 ]]; then
              echo "No BenchmarkDotNet reports found for suite '${suite}'." >&2
              exit 1
            fi
            # Keep the first report's envelope (Title/HostEnvironmentInfo) and concatenate the
            # Benchmarks arrays from every per-class report into it.
            jq -s '.[0] * {Benchmarks: (map(.Benchmarks) | add)}' "${reports[@]}" > "${outFile}"
            if ! jq -e 'all(.Benchmarks[]; (.Statistics.Mean? != null))' "${outFile}" > /dev/null; then
              jq -r '.Benchmarks[] | select(.Statistics.Mean? == null) |
                "Benchmark produced no mean: \(.FullName // .DisplayInfo // "unknown")"' "${outFile}" >&2
              exit 1
            fi
            echo "Merged ${#reports[@]} report(s) into ${outFile}"
          }
          merge_suite services
          merge_suite kernels

      - name: Upload raw benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: artifacts/benchmarks/**
          if-no-files-found: warn
          retention-days: 30

      - name: Track / alert on Services benchmarks
        if: env.IS_TRACKING_RUN != 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: DotBoxD.Services Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: artifacts/benchmarks/merged/services.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: dev/bench/services
          alert-threshold: '150%'
          # PR jobs are read-only. Keep the failing gate and surface details in the job summary.
          comment-on-alert: false
          summary-always: true
          fail-on-alert: ${{ env.IS_GATING_RUN == 'true' }}
          auto-push: ${{ env.IS_TRACKING_RUN == 'true' }}

      - name: Track / alert on Kernels benchmarks
        if: env.IS_TRACKING_RUN != 'true'
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: DotBoxD.Kernels Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: artifacts/benchmarks/merged/kernels.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: dev/bench/kernels
          alert-threshold: '150%'
          comment-on-alert: false
          summary-always: true
          fail-on-alert: ${{ env.IS_GATING_RUN == 'true' }}
          auto-push: ${{ env.IS_TRACKING_RUN == 'true' }}
          # The Services tracker already fetched and checked out this ref in the same job.
          skip-fetch-gh-pages: true

  publish-history:
    name: Publish benchmark history
    needs: benchmark
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download benchmark results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: benchmark-results
          path: artifacts/benchmarks

      - name: Track / alert on Services benchmarks
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: DotBoxD.Services Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: artifacts/benchmarks/merged/services.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: dev/bench/services
          alert-threshold: '150%'
          comment-on-alert: false
          summary-always: true
          fail-on-alert: true
          auto-push: true

      - name: Track / alert on Kernels benchmarks
        uses: benchmark-action/github-action-benchmark@52576c92bccf6ac60c8223ec7eb2565637cae9ba # v1.22.1
        with:
          name: DotBoxD.Kernels Benchmarks
          tool: 'benchmarkdotnet'
          output-file-path: artifacts/benchmarks/merged/kernels.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          benchmark-data-dir-path: dev/bench/kernels
          alert-threshold: '150%'
          comment-on-alert: false
          summary-always: true
          fail-on-alert: true
          auto-push: true
          # The Services tracker already fetched and checked out this ref in the same job.
          skip-fetch-gh-pages: true
